<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator </title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://kit.fontawesome.com/f490d52a52.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container-main">
        <header class="heading">
            <span class="heading-txt">Elevator System</span>
        </header>

        <main>
            <div class="container">
                <div class="elevators-container">
                    <div class="elevators">
                        <div class="elevator--1 elevator">
                            <div id="" class="elevator-box--1 box"><div class="floor-no--container">1</div>
                            </div>
                        </div>
                        <div class="elevator--2 elevator">
                            <div id="" class="elevator-box--1 box"><div class="floor-no--container">1</div></div>
                        </div>
                        <div class="elevator--3 elevator">
                            <div id="" class="elevator-box--1 box"><div class="floor-no--container">1</div></div>
                        </div>
                        <div class="elevator-btns">
                            <div class="btn-row">
                                <span class="floor-no" value="5" id="5">5</span>
                                <button class="btn-down" id="5"><i class="fa-solid fa-caret-down"></i></button>
                            </div>
                            <div class="btn-row">
                                <span class="floor-no" value="4" id="4">4</span>
                                <button class="btn-up" id="4"><i class="fa-solid fa-caret-up"></i></button>
                                <button class="btn-down" id="4"><i class="fa-solid fa-caret-down"></i></button>
                            </div>
                            <div class="btn-row">
                                <span class="floor-no" value="3" id="3">3</span>
                                <button class="btn-up" id="3"><i class="fa-solid fa-caret-up"></i></button>
                                <button class="btn-down" id="3"><i class="fa-solid fa-caret-down"></i></button>
                            </div>
                            <div class="btn-row">
                                <span class="floor-no" value="2" id="2">2</span>
                                <button class="btn-up" id="2"><i class="fa-solid fa-caret-up"></i></button>
                                <button class="btn-down" id="2"><i class="fa-solid fa-caret-down"></i></button>
                            </div>
                            <div class="btn-row">
                                <span class="floor-no" value="1" id="1">1</span>
                                <button class="btn-up" id="1"><i class="fa-solid fa-caret-up"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="footer">
                        <div class="maintainance-mode btn"><input type="checkbox" class="slider"></div>
                        <div class="maintainance-mode btn"><input type="checkbox" class="slider"></div>
                        <div class="maintainance-mode btn"><input type="checkbox" class="slider"></div>
                        <div class="maintainance-mode btn">Maintenance</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
